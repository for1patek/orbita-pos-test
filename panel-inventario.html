<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Órbita · Panel de Inventario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0d0d0f; --card:#16161a; --card2:#1c1c22; --border:#2a2a30; --text:#ececf1; --muted:#8b8b9a; --fire:#ff4d00; --green:#25d366; --red:#e53e3e; --yellow:#f6c90e; --hand:#ff4d00; --cafe:#c97b7b; --fuente:#d4872a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 28px; max-width:380px; width:100%; }
        .login-card h1 { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; color:var(--fire); margin-bottom:4px; }
        .login-card p { font-size:0.8rem; color:var(--muted); margin-bottom:24px; }
        .login-card input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:#0a0a0c; color:var(--text); font-size:1rem; margin-bottom:10px; outline:none; font-family:'DM Sans',sans-serif; }
        .login-card input:focus { border-color:var(--fire); }
        .login-err { color:var(--red); font-size:0.83rem; margin-bottom:10px; display:none; }
        .btn-login { width:100%; padding:13px; background:var(--fire); color:#fff; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:2px; cursor:pointer; }
        .wrap { max-width:1100px; margin:0 auto; padding:28px 18px 60px; }
        header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
        header h1 { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:3px; color:var(--fire); }
        .btn-logout { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:0.82rem; cursor:pointer; }
        .btn-logout:hover { border-color:var(--red); color:var(--red); }
        .tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
        .tab-btn { padding:9px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-weight:600; font-size:0.85rem; cursor:pointer; transition:all 0.18s; position:relative; }
        .tab-btn:hover { border-color:var(--fire); color:var(--text); }
        .tab-btn.active { background:var(--fire); color:#fff; border-color:var(--fire); }
        .tab-btn .badge { position:absolute; top:-7px; right:-7px; background:var(--red); color:#fff; font-size:0.65rem; font-weight:800; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; }
        .card-title { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:2px; margin-bottom:14px; color:var(--fire); }
        .stock-table { width:100%; border-collapse:collapse; font-size:0.87rem; }
        .stock-table th { text-align:left; padding:8px 12px; font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:700; }
        .stock-table th.c-hand { color:var(--hand); text-align:center; }
        .stock-table th.c-cafe { color:var(--cafe); text-align:center; }
        .stock-table th.c-fuente { color:var(--fuente); text-align:center; }
        .stock-table td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
        .stock-table td.qty { text-align:center; font-weight:700; font-size:0.95rem; }
        .stock-table td.qty.ok { color:var(--green); }
        .stock-table td.qty.low { color:var(--yellow); }
        .stock-table td.qty.empty { color:var(--red); }
        .stock-table td.qty.none { color:var(--border); }
        .stock-table tr:last-child td { border-bottom:none; }
        .stock-table .cat-row td { background:var(--card2); font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:5px 12px; font-weight:700; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
        @media(max-width:560px){ .form-grid { grid-template-columns:1fr; } }
        label { display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; font-weight:700; }
        select, input[type=number], input[type=text] { width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--border); background:#0a0a0c; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; }
        select:focus, input:focus { border-color:var(--fire); }
        .btn-primary { padding:12px 28px; background:var(--fire); color:#fff; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; cursor:pointer; }
        .btn-primary:hover { opacity:0.85; }
        .btn-save-min { padding:6px 14px; background:var(--fire); color:#fff; border:none; border-radius:8px; font-size:0.8rem; cursor:pointer; white-space:nowrap; }
        .alerta-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-radius:10px; margin-bottom:8px; font-size:0.88rem; }
        .alerta-item.red { background:rgba(229,62,62,0.12); border:1px solid rgba(229,62,62,0.3); }
        .alerta-item.yellow { background:rgba(246,201,14,0.10); border:1px solid rgba(246,201,14,0.3); }
        .alerta-sitio { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; font-weight:700; }
        .alerta-sitio.hand { color:var(--hand); }
        .alerta-sitio.cafe { color:var(--cafe); }
        .alerta-sitio.fuente { color:var(--fuente); }
        .min-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); gap:12px; }
        .min-row:last-child { border-bottom:none; }
        .min-row input[type=number] { width:80px; padding:7px 10px; font-size:0.9rem; }
        .hist-row { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:0.85rem; align-items:flex-start; }
        .hist-row:last-child { border-bottom:none; }
        .hist-tipo { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:2px 8px; border-radius:20px; white-space:nowrap; }
        .hist-tipo.ingreso { background:rgba(37,211,102,0.15); color:var(--green); }
        .hist-tipo.venta { background:rgba(229,62,62,0.15); color:var(--red); }
        .hist-tipo.ajuste { background:rgba(139,139,154,0.15); color:var(--muted); }
        .filtros { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .filtros select { width:auto; }
        .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:12px; font-size:0.88rem; font-weight:600; z-index:999; opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.ok { background:#1a3a2a; border:1px solid var(--green); color:var(--green); }
        .toast.err { background:#3a1a1a; border:1px solid var(--red); color:var(--red); }
        .empty-msg { text-align:center; color:var(--muted); padding:32px 0; font-size:0.9rem; }
        .loading { text-align:center; color:var(--muted); padding:20px 0; font-size:0.85rem; }
    </style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
    <div class="login-card">
        <h1>ÓRBITA</h1>
        <p>Panel de Inventario · Acceso restringido</p>
        <div class="login-err" id="login-err">Correo o contraseña incorrectos</div>
        <input type="email" id="inp-email" placeholder="Correo">
        <input type="password" id="inp-pass" placeholder="Contraseña">
        <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    </div>
</div>

<div class="wrap" id="dashboard" style="display:none">
    <header>
        <div>
            <h1>INVENTARIO</h1>
            <p id="hdr-usuario" style="font-size:0.78rem;color:var(--muted);margin-top:2px;"></p>
        </div>
        <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('general',this)">Vista general</button>
        <button class="tab-btn" onclick="showTab('individual',this)">Por local</button>
        <button class="tab-btn" onclick="showTab('reponer',this)">Reponer</button>
        <button class="tab-btn" onclick="showTab('alertas',this)" id="btn-tab-alertas">Alertas</button>
        <button class="tab-btn" onclick="showTab('minimos',this)">Minimos</button>
        <button class="tab-btn" onclick="showTab('historial',this)">Historial</button>
    </div>

    <div class="tab-panel active" id="tab-general">
        <div class="card">
            <div class="card-title">Stock consolidado — todos los insumos</div>
            <div id="tabla-general"><p class="loading">Cargando...</p></div>
        </div>
    </div>

    <div class="tab-panel" id="tab-individual">
        <div class="card">
            <div style="margin-bottom:16px;">
                <label>Local</label>
                <select id="ind-sitio" onchange="renderIndividual()">
                    <option value="handroll">Hand Roll</option>
                    <option value="cafe">Cafe Orbita</option>
                    <option value="fuente">Fuente de Soda</option>
                </select>
            </div>
            <div id="tabla-individual"><p class="loading">Cargando...</p></div>
        </div>
    </div>

    <div class="tab-panel" id="tab-reponer">
        <div class="card">
            <div class="card-title">Reponer stock</div>
            <div class="form-grid">
                <div>
                    <label>Local</label>
                    <select id="rep-sitio" onchange="poblarInsumos('rep-sitio','rep-item')">
                        <option value="handroll">Hand Roll</option>
                        <option value="cafe">Cafe Orbita</option>
                        <option value="fuente">Fuente de Soda</option>
                    </select>
                </div>
                <div>
                    <label>Insumo</label>
                    <select id="rep-item"></select>
                </div>
                <div>
                    <label>Cantidad a sumar</label>
                    <input type="number" id="rep-cant" min="1" value="1">
                </div>
                <div>
                    <label>Nota (opcional)</label>
                    <input type="text" id="rep-nota" placeholder="Ej: Compra del dia">
                </div>
            </div>
            <button class="btn-primary" onclick="reponerStock()">CONFIRMAR REPOSICION</button>
        </div>
    </div>

    <div class="tab-panel" id="tab-alertas">
        <div class="card">
            <div class="card-title" style="color:var(--red)">Insumos agotados</div>
            <div id="alertas-agotados"><p class="empty-msg">Ninguno agotado</p></div>
        </div>
        <div class="card">
            <div class="card-title" style="color:var(--yellow)">Stock bajo el minimo</div>
            <div id="alertas-bajos"><p class="empty-msg">Todo dentro del minimo</p></div>
        </div>
    </div>

    <div class="tab-panel" id="tab-minimos">
        <div class="card">
            <div style="margin-bottom:16px;">
                <label>Local</label>
                <select id="min-sitio" onchange="renderMinimos()">
                    <option value="handroll">Hand Roll</option>
                    <option value="cafe">Cafe Orbita</option>
                    <option value="fuente">Fuente de Soda</option>
                </select>
            </div>
            <div id="tabla-minimos"></div>
        </div>
    </div>

    <div class="tab-panel" id="tab-historial">
        <div class="card">
            <div class="filtros">
                <div>
                    <label>Local</label>
                    <select id="hist-sitio" onchange="cargarHistorial()">
                        <option value="">Todos</option>
                        <option value="handroll">Hand Roll</option>
                        <option value="cafe">Cafe</option>
                        <option value="fuente">Fuente</option>
                    </select>
                </div>
                <div>
                    <label>Tipo</label>
                    <select id="hist-tipo" onchange="cargarHistorial()">
                        <option value="">Todos</option>
                        <option value="ingreso">Ingreso</option>
                        <option value="venta">Venta</option>
                        <option value="ajuste">Ajuste</option>
                    </select>
                </div>
            </div>
            <div id="tabla-historial"><p class="loading">Cargando...</p></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./orbita-auth.js"></script>
<script>
const SB = window.supabase.createClient(
    window.orbitaAuth?.url     || 'https://ftyxipxsyzldofdyamqt.supabase.co',
    window.orbitaAuth?.anonKey || ''
);

const SITIO_LABEL = { handroll:'Hand Roll', cafe:'Cafe Orbita', fuente:'Fuente de Soda' };
const SITIO_CLASS = { handroll:'hand', cafe:'cafe', fuente:'fuente' };
const CAT_LABEL   = { proteina:'Proteinas', panaderia:'Panaderia', vegetal:'Vegetales', lacteo:'Lacteos', bebida:'Bebidas', fruta:'Jugos', cafe:'Cafe', congelado:'Congelados', otro:'Otros' };

let items    = [];
let stockMap = new Map();

async function doLogin() {
    const email = document.getElementById('inp-email').value.trim();
    const pass  = document.getElementById('inp-pass').value;
    const err   = document.getElementById('login-err');
    err.style.display = 'none';
    const { error } = await SB.auth.signInWithPassword({ email, password: pass });
    if (error) { err.style.display = 'block'; return; }
    await mostrarDashboard();
}

async function doLogout() {
    await SB.auth.signOut();
    document.getElementById('dashboard').style.display  = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
}

async function mostrarDashboard() {
    const { data: { user } } = await SB.auth.getUser();
    if (!user) return;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display  = 'block';
    document.getElementById('hdr-usuario').textContent  = user.email;
    await cargarTodo();
    poblarInsumos('rep-sitio', 'rep-item');
}

async function cargarTodo() {
    try {
        const { data: itemsData, error: e1 } = await SB
            .from('stock_items')
            .select('id, nombre, unidad, categoria, tipo_control, sitios, activo')
            .eq('activo', true)
            .order('categoria');
        if (e1) throw e1;
        items = itemsData || [];

        const { data: stockData, error: e2 } = await SB
            .from('stock_local')
            .select('id, item_id, sitio, cantidad, alerta_min');
        if (e2) throw e2;

        stockMap.clear();
        (stockData || []).forEach(r => {
            stockMap.set(r.item_id + '|' + r.sitio, {
                cantidad:   r.cantidad   ?? 0,
                alerta_min: r.alerta_min ?? 0,
                local_id:   r.id
            });
        });

        renderGeneral();
        renderIndividual();
        renderAlertas();
        renderMinimos();
    } catch (e) {
        toast('Error cargando datos: ' + (e.message || e), 'err');
    }
}

function getStock(itemId, sitio) {
    return stockMap.get(itemId + '|' + sitio) || null;
}

function renderGeneral() {
    if (!items.length) { document.getElementById('tabla-general').innerHTML = '<p class="empty-msg">No hay insumos en el catalogo</p>'; return; }
    const porCat = {};
    items.forEach(p => { const c = p.categoria||'otro'; if(!porCat[c]) porCat[c]=[]; porCat[c].push(p); });
    let html = '<table class="stock-table"><thead><tr><th>Insumo</th><th>Ud.</th><th class="c-hand">Hand Roll</th><th class="c-cafe">Cafe</th><th class="c-fuente">Fuente</th></tr></thead><tbody>';
    Object.entries(porCat).forEach(([cat, insumos]) => {
        html += '<tr class="cat-row"><td colspan="5">' + (CAT_LABEL[cat]||cat) + '</td></tr>';
        insumos.forEach(p => {
            html += '<tr><td>' + p.nombre + '</td><td style="color:var(--muted);font-size:0.8rem">' + p.unidad + '</td>';
            ['handroll','cafe','fuente'].forEach(sitio => {
                if (!p.sitios?.includes(sitio)) { html += '<td class="qty none">-</td>'; return; }
                const s = getStock(p.id, sitio);
                if (!s) { html += '<td class="qty none">-</td>'; return; }
                const cls = s.cantidad===0 ? 'empty' : s.cantidad<=s.alerta_min ? 'low' : 'ok';
                html += '<td class="qty ' + cls + '">' + s.cantidad + '</td>';
            });
            html += '</tr>';
        });
    });
    html += '</tbody></table>';
    document.getElementById('tabla-general').innerHTML = html;
}

function renderIndividual() {
    const sitio   = document.getElementById('ind-sitio').value;
    const insumos = items.filter(p => p.sitios?.includes(sitio));
    if (!insumos.length) { document.getElementById('tabla-individual').innerHTML = '<p class="empty-msg">No hay insumos para este local</p>'; return; }
    const porCat = {};
    insumos.forEach(p => { const c = p.categoria||'otro'; if(!porCat[c]) porCat[c]=[]; porCat[c].push(p); });
    let html = '<table class="stock-table"><thead><tr><th>Insumo</th><th>Ud.</th><th>Stock</th><th>Minimo</th><th>Estado</th></tr></thead><tbody>';
    Object.entries(porCat).forEach(([cat, ins]) => {
        html += '<tr class="cat-row"><td colspan="5">' + (CAT_LABEL[cat]||cat) + '</td></tr>';
        ins.forEach(p => {
            const s = getStock(p.id, sitio);
            const qty = s?.cantidad ?? null;
            const min = s?.alerta_min ?? 0;
            let estado = '-', cls = 'none';
            if (qty !== null) {
                if (qty===0) { estado='Agotado'; cls='empty'; }
                else if (qty<=min) { estado='Bajo'; cls='low'; }
                else { estado='OK'; cls='ok'; }
            }
            html += '<tr><td>' + p.nombre + '</td><td style="color:var(--muted);font-size:0.8rem">' + p.unidad + '</td><td class="qty ' + cls + '">' + (qty??'-') + '</td><td style="text-align:center;color:var(--muted)">' + min + '</td><td style="font-size:0.82rem">' + estado + '</td></tr>';
        });
    });
    html += '</tbody></table>';
    document.getElementById('tabla-individual').innerHTML = html;
}

function poblarInsumos(selectSitioId, selectItemId) {
    const sitio   = document.getElementById(selectSitioId).value;
    const sel     = document.getElementById(selectItemId);
    const insumos = items.filter(p => p.sitios?.includes(sitio));
    let html = '', lastCat = '';
    insumos.forEach(p => {
        const cat = CAT_LABEL[p.categoria]||p.categoria;
        if (cat !== lastCat) { if (lastCat) html += '</optgroup>'; html += '<optgroup label="' + cat + '">'; lastCat = cat; }
        const s = getStock(p.id, sitio);
        const stock = s !== null ? ' (stock: ' + (s?.cantidad??0) + ' ' + p.unidad + ')' : '';
        html += '<option value="' + p.id + '" data-unidad="' + p.unidad + '" data-nombre="' + p.nombre + '">' + p.nombre + stock + '</option>';
    });
    if (lastCat) html += '</optgroup>';
    sel.innerHTML = html;
}

async function reponerStock() {
    const sitio  = document.getElementById('rep-sitio').value;
    const itemId = document.getElementById('rep-item').value;
    const cant   = parseFloat(document.getElementById('rep-cant').value);
    const nota   = document.getElementById('rep-nota').value.trim();
    const opt    = document.getElementById('rep-item').selectedOptions[0];
    const nombre = opt?.dataset?.nombre || itemId;
    const unidad = opt?.dataset?.unidad || '';
    if (!cant || cant <= 0) { toast('Ingresa una cantidad valida', 'err'); return; }
    const s      = getStock(itemId, sitio);
    const actual = s?.cantidad ?? 0;
    const min    = s?.alerta_min ?? 0;
    const nueva  = actual + cant;
    try {
        const { error: e1 } = await SB.from('stock_local').upsert(
            { item_id: itemId, sitio, cantidad: nueva, alerta_min: min, updated_at: new Date().toISOString() },
            { onConflict: 'item_id,sitio' }
        );
        if (e1) throw e1;
        const { error: e2 } = await SB.from('stock_movimientos').insert({
            item_id: itemId, sitio, tipo: 'ingreso',
            cantidad: cant, cantidad_anterior: actual,
            usuario: 'panel_inventario',
            nota: nota || 'Reposicion manual'
        });
        if (e2) throw e2;
        stockMap.set(itemId + '|' + sitio, { cantidad: nueva, alerta_min: min });
        await cargarTodo();
        poblarInsumos('rep-sitio', 'rep-item');
        document.getElementById('rep-cant').value = 1;
        document.getElementById('rep-nota').value = '';
        toast(nombre + ': +' + cant + ' ' + unidad + ' en ' + SITIO_LABEL[sitio], 'ok');
    } catch(e) { toast('Error al reponer: ' + (e.message||e), 'err'); }
}

function renderAlertas() {
    const agotados = [], bajos = [];
    items.forEach(p => {
        (p.sitios||[]).forEach(sitio => {
            const s = getStock(p.id, sitio);
            if (!s) return;
            const e = { ...p, sitio, cantidad: s.cantidad, min: s.alerta_min };
            if (s.cantidad===0) agotados.push(e);
            else if (s.cantidad<=s.alerta_min) bajos.push(e);
        });
    });
    const total = agotados.length + bajos.length;
    const btn = document.getElementById('btn-tab-alertas');
    btn.innerHTML = 'Alertas' + (total>0 ? ' <span class="badge">' + total + '</span>' : '');
    const render = (lista, id, cls) => {
        if (!lista.length) { document.getElementById(id).innerHTML = '<p class="empty-msg">Ninguno</p>'; return; }
        document.getElementById(id).innerHTML = lista.map(p =>
            '<div class="alerta-item ' + cls + '"><div><span class="alerta-sitio ' + SITIO_CLASS[p.sitio] + '">' + SITIO_LABEL[p.sitio] + '</span><div style="font-weight:600;margin-top:2px">' + p.nombre + '</div></div><div style="text-align:right;font-size:0.82rem"><div style="font-weight:700">' + p.cantidad + ' ' + p.unidad + '</div><div style="color:var(--muted)">min ' + p.min + '</div></div></div>'
        ).join('');
    };
    render(agotados, 'alertas-agotados', 'red');
    render(bajos,    'alertas-bajos',    'yellow');
}

function renderMinimos() {
    const sitio   = document.getElementById('min-sitio').value;
    const insumos = items.filter(p => p.sitios?.includes(sitio));
    if (!insumos.length) { document.getElementById('tabla-minimos').innerHTML = '<p class="empty-msg">No hay insumos</p>'; return; }
    document.getElementById('tabla-minimos').innerHTML = insumos.map(p => {
        const s = getStock(p.id, sitio);
        const min = s?.alerta_min ?? 0;
        return '<div class="min-row"><span style="font-size:0.88rem">' + p.nombre + ' <span style="font-size:0.7rem;color:var(--muted)">' + p.unidad + '</span></span><div style="display:flex;gap:8px;align-items:center"><input type="number" id="min-' + p.id + '" value="' + min + '" min="0" style="width:80px"><button class="btn-save-min" onclick="guardarMinimo(\'' + p.id + '\',\'' + sitio + '\')">Guardar</button></div></div>';
    }).join('');
}

async function guardarMinimo(itemId, sitio) {
    const min  = parseFloat(document.getElementById('min-' + itemId).value);
    if (isNaN(min)||min<0) { toast('Valor invalido', 'err'); return; }
    const s    = getStock(itemId, sitio);
    const cant = s?.cantidad ?? 0;
    try {
        const { error } = await SB.from('stock_local').upsert(
            { item_id: itemId, sitio, cantidad: cant, alerta_min: min, updated_at: new Date().toISOString() },
            { onConflict: 'item_id,sitio' }
        );
        if (error) throw error;
        const cur = stockMap.get(itemId + '|' + sitio) || { cantidad: cant };
        cur.alerta_min = min;
        stockMap.set(itemId + '|' + sitio, cur);
        renderAlertas();
        toast('Minimo guardado', 'ok');
    } catch(e) { toast('Error: ' + (e.message||e), 'err'); }
}

async function cargarHistorial() {
    document.getElementById('tabla-historial').innerHTML = '<p class="loading">Cargando...</p>';
    const sitio = document.getElementById('hist-sitio').value;
    const tipo  = document.getElementById('hist-tipo').value;
    try {
        let q = SB.from('stock_movimientos')
            .select('item_id, sitio, tipo, cantidad, cantidad_anterior, usuario, nota, creado_at')
            .order('creado_at', { ascending: false }).limit(60);
        if (sitio) q = q.eq('sitio', sitio);
        if (tipo)  q = q.eq('tipo', tipo);
        const { data, error } = await q;
        if (error) throw error;
        if (!data?.length) { document.getElementById('tabla-historial').innerHTML = '<p class="empty-msg">Sin movimientos</p>'; return; }
        document.getElementById('tabla-historial').innerHTML = data.map(r => {
            const insumo = items.find(i => i.id === r.item_id);
            const nombre = insumo?.nombre || r.item_id;
            const unidad = insumo?.unidad || '';
            const fecha  = new Date(r.creado_at).toLocaleString('es-CL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            const signo  = r.tipo==='ingreso' ? '+' : r.tipo==='venta' ? '-' : '+-';
            return '<div class="hist-row"><span class="hist-tipo ' + r.tipo + '">' + r.tipo + '</span><div style="flex:1"><div style="font-weight:600;font-size:0.87rem">' + nombre + '</div><div style="color:var(--muted);font-size:0.78rem">' + (SITIO_LABEL[r.sitio]||r.sitio) + ' - ' + (r.nota||r.usuario||'') + '</div></div><div style="text-align:right;white-space:nowrap"><div style="font-weight:700">' + signo + r.cantidad + ' ' + unidad + '</div><div style="color:var(--muted);font-size:0.75rem">' + fecha + '</div></div></div>';
        }).join('');
    } catch(e) { document.getElementById('tabla-historial').innerHTML = '<p class="empty-msg">Error al cargar historial</p>'; }
}

function showTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
    if (id==='historial')  cargarHistorial();
    if (id==='individual') renderIndividual();
    if (id==='minimos')    renderMinimos();
}

let _toastTimer;
function toast(msg, tipo) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (tipo||'ok');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

(async function init() {
    const { data: { session } } = await SB.auth.getSession();
    if (session) await mostrarDashboard();
    document.getElementById('inp-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
})();
</script>
