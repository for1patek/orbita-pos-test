<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Órbita · Panel de Inventario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0d0d0f; --card:#16161a; --card2:#1c1c22;
            --border:#2a2a30; --text:#ececf1; --muted:#8b8b9a;
            --fire:#ff4d00; --green:#25d366; --red:#e53e3e;
            --yellow:#f6c90e; --hand:#ff4d00; --cafe:#c97b7b; --fuente:#d4872a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* LOGIN */
        .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 28px; max-width:380px; width:100%; }
        .login-card h1 { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; color:var(--fire); margin-bottom:4px; }
        .login-card p  { font-size:0.8rem; color:var(--muted); margin-bottom:24px; }
        .login-card input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:#0a0a0c; color:var(--text); font-size:1rem; margin-bottom:10px; outline:none; font-family:'DM Sans',sans-serif; }
        .login-card input:focus { border-color:var(--fire); }
        .login-err { color:var(--red); font-size:0.83rem; margin-bottom:10px; display:none; }
        .btn-login { width:100%; padding:13px; background:var(--fire); color:#fff; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:2px; cursor:pointer; }

        /* LAYOUT */
        .wrap { max-width:1100px; margin:0 auto; padding:28px 18px 60px; }
        header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
        header h1 { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:3px; color:var(--fire); }
        .btn-logout { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:0.82rem; cursor:pointer; }
        .btn-logout:hover { border-color:var(--red); color:var(--red); }

        /* TABS */
        .tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
        .tab-btn { padding:9px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-weight:600; font-size:0.85rem; cursor:pointer; transition:all 0.18s; position:relative; }
        .tab-btn:hover { border-color:var(--fire); color:var(--text); }
        .tab-btn.active { background:var(--fire); color:#fff; border-color:var(--fire); }
        .tab-btn .badge { position:absolute; top:-7px; right:-7px; background:var(--red); color:#fff; font-size:0.65rem; font-weight:800; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }

        /* CARDS */
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; }
        .card-title { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:2px; margin-bottom:14px; }

        /* TABLA GENERAL */
        .stock-table { width:100%; border-collapse:collapse; font-size:0.87rem; }
        .stock-table th { text-align:left; padding:8px 12px; font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:700; }
        .stock-table th.c-hand   { color:var(--hand);   text-align:center; }
        .stock-table th.c-cafe   { color:var(--cafe);   text-align:center; }
        .stock-table th.c-fuente { color:var(--fuente); text-align:center; }
        .stock-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
        .stock-table td.qty { text-align:center; font-weight:700; font-size:0.95rem; }
        .stock-table td.qty.ok     { color:var(--green); }
        .stock-table td.qty.low    { color:var(--yellow); }
        .stock-table td.qty.empty  { color:var(--red); }
        .stock-table td.qty.none   { color:var(--border); }
        .stock-table tr:last-child td { border-bottom:none; }
        .stock-table .cat-header td { background:var(--card2); font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:6px 12px; font-weight:700; }

        /* FORMULARIOS */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
        @media(max-width:560px){ .form-grid { grid-template-columns:1fr; } }
        label { display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; font-weight:700; }
        select, input[type=number], input[type=text] { width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--border); background:#0a0a0c; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; }
        select:focus, input:focus { border-color:var(--fire); }
        .btn-primary { padding:12px 28px; background:var(--fire); color:#fff; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; cursor:pointer; transition:opacity 0.2s; }
        .btn-primary:hover { opacity:0.85; }
        .btn-secondary { padding:10px 20px; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:10px; font-size:0.85rem; cursor:pointer; }
        .btn-secondary:hover { border-color:var(--text); color:var(--text); }

        /* ALERTAS */
        .alerta-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-radius:10px; margin-bottom:8px; font-size:0.88rem; }
        .alerta-item.red    { background:rgba(229,62,62,0.12); border:1px solid rgba(229,62,62,0.3); }
        .alerta-item.yellow { background:rgba(246,201,14,0.10); border:1px solid rgba(246,201,14,0.3); }
        .alerta-sitio { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; }
        .alerta-sitio.hand   { color:var(--hand);   }
        .alerta-sitio.cafe   { color:var(--cafe);   }
        .alerta-sitio.fuente { color:var(--fuente); }

        /* MÍNIMOS */
        .min-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); gap:12px; }
        .min-row:last-child { border-bottom:none; }
        .min-row input[type=number] { width:80px; padding:7px 10px; font-size:0.9rem; }
        .btn-save-min { padding:6px 14px; background:var(--fire); color:#fff; border:none; border-radius:8px; font-size:0.8rem; cursor:pointer; }

        /* HISTORIAL */
        .hist-row { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:0.85rem; align-items:flex-start; }
        .hist-row:last-child { border-bottom:none; }
        .hist-tipo { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:2px 8px; border-radius:20px; white-space:nowrap; }
        .hist-tipo.ingreso     { background:rgba(37,211,102,0.15); color:var(--green); }
        .hist-tipo.salida      { background:rgba(229,62,62,0.15);  color:var(--red);   }
        .hist-tipo.transferencia { background:rgba(246,201,14,0.15); color:var(--yellow); }
        .hist-tipo.ajuste      { background:rgba(139,139,154,0.15); color:var(--muted); }

        /* FILTROS */
        .filtros { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .filtros select { width:auto; }

        .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:12px; font-size:0.88rem; font-weight:600; z-index:999; opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.ok  { background:#1a3a2a; border:1px solid var(--green); color:var(--green); }
        .toast.err { background:#3a1a1a; border:1px solid var(--red);   color:var(--red);   }

        .empty-msg { text-align:center; color:var(--muted); padding:32px 0; font-size:0.9rem; }
        .loading   { text-align:center; color:var(--muted); padding:20px 0; font-size:0.85rem; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
    <div class="login-card">
        <h1>ÓRBITA</h1>
        <p>Panel de Inventario · Acceso restringido</p>
        <div class="login-err" id="login-err">Correo o contraseña incorrectos</div>
        <input type="email"    id="inp-email" placeholder="Correo">
        <input type="password" id="inp-pass"  placeholder="Contraseña">
        <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="wrap" id="dashboard" style="display:none">
    <header>
        <div>
            <h1>📦 INVENTARIO</h1>
            <p id="hdr-usuario" style="font-size:0.78rem;color:var(--muted);margin-top:2px;"></p>
        </div>
        <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('general',this)">📊 Vista general</button>
        <button class="tab-btn" onclick="showTab('individual',this)">🏪 Por local</button>
        <button class="tab-btn" onclick="showTab('reponer',this)">➕ Reponer</button>
        <button class="tab-btn" onclick="showTab('mover',this)">🔀 Mover</button>
        <button class="tab-btn" id="btn-tab-alertas" onclick="showTab('alertas',this)">⚠️ Alertas</button>
        <button class="tab-btn" onclick="showTab('minimos',this)">⚙️ Mínimos</button>
        <button class="tab-btn" onclick="showTab('historial',this)">📋 Historial</button>
    </div>

    <!-- VISTA GENERAL -->
    <div class="tab-panel active" id="tab-general">
        <div class="card">
            <div class="card-title">Stock consolidado — los 3 locales</div>
            <div id="tabla-general"><p class="loading">Cargando...</p></div>
        </div>
    </div>

    <!-- VISTA INDIVIDUAL -->
    <div class="tab-panel" id="tab-individual">
        <div class="card">
            <div style="margin-bottom:16px;">
                <label>Local</label>
                <select id="ind-sitio" onchange="renderIndividual()">
                    <option value="handroll">🍣 Hand Roll</option>
                    <option value="cafe">☕ Café Órbita</option>
                    <option value="fuente">🌭 Fuente de Soda</option>
                </select>
            </div>
            <div id="tabla-individual"><p class="loading">Cargando...</p></div>
        </div>
    </div>

    <!-- REPONER -->
    <div class="tab-panel" id="tab-reponer">
        <div class="card">
            <div class="card-title">Reponer stock</div>
            <div class="form-grid">
                <div>
                    <label>Local</label>
                    <select id="rep-sitio" onchange="poblarProductos('rep-sitio','rep-prod')">
                        <option value="handroll">🍣 Hand Roll</option>
                        <option value="cafe">☕ Café Órbita</option>
                        <option value="fuente">🌭 Fuente de Soda</option>
                    </select>
                </div>
                <div>
                    <label>Producto</label>
                    <select id="rep-prod"></select>
                </div>
                <div>
                    <label>Cantidad a sumar</label>
                    <input type="number" id="rep-cant" min="1" value="1" placeholder="Ej: 10">
                </div>
                <div>
                    <label>Nota (opcional)</label>
                    <input type="text" id="rep-nota" placeholder="Ej: Compra del día">
                </div>
            </div>
            <button class="btn-primary" onclick="reponerStock()">CONFIRMAR REPOSICIÓN</button>
        </div>
    </div>

    <!-- MOVER -->
    <div class="tab-panel" id="tab-mover">
        <div class="card">
            <div class="card-title">Mover stock entre locales</div>
            <div class="form-grid">
                <div>
                    <label>Desde</label>
                    <select id="mov-origen" onchange="poblarProductos('mov-origen','mov-prod')">
                        <option value="handroll">🍣 Hand Roll</option>
                        <option value="cafe">☕ Café Órbita</option>
                        <option value="fuente">🌭 Fuente de Soda</option>
                    </select>
                </div>
                <div>
                    <label>Hacia</label>
                    <select id="mov-destino">
                        <option value="cafe">☕ Café Órbita</option>
                        <option value="fuente">🌭 Fuente de Soda</option>
                        <option value="handroll">🍣 Hand Roll</option>
                    </select>
                </div>
                <div>
                    <label>Producto</label>
                    <select id="mov-prod"></select>
                </div>
                <div>
                    <label>Cantidad</label>
                    <input type="number" id="mov-cant" min="1" value="1">
                </div>
            </div>
            <button class="btn-primary" onclick="moverStock()">CONFIRMAR MOVIMIENTO</button>
        </div>
    </div>

    <!-- ALERTAS -->
    <div class="tab-panel" id="tab-alertas">
        <div class="card">
            <div class="card-title" style="color:var(--red)">Productos agotados</div>
            <div id="alertas-agotados"><p class="empty-msg">✅ Ninguno agotado</p></div>
        </div>
        <div class="card">
            <div class="card-title" style="color:var(--yellow)">Stock bajo el mínimo</div>
            <div id="alertas-bajos"><p class="empty-msg">✅ Todo dentro del mínimo</p></div>
        </div>
    </div>

    <!-- MÍNIMOS -->
    <div class="tab-panel" id="tab-minimos">
        <div class="card">
            <div style="margin-bottom:16px; display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
                <div>
                    <label>Local</label>
                    <select id="min-sitio" onchange="renderMinimos()">
                        <option value="handroll">🍣 Hand Roll</option>
                        <option value="cafe">☕ Café Órbita</option>
                        <option value="fuente">🌭 Fuente de Soda</option>
                    </select>
                </div>
            </div>
            <div id="tabla-minimos"></div>
        </div>
    </div>

    <!-- HISTORIAL -->
    <div class="tab-panel" id="tab-historial">
        <div class="card">
            <div class="filtros">
                <div>
                    <label>Local</label>
                    <select id="hist-sitio" onchange="cargarHistorial()">
                        <option value="">Todos</option>
                        <option value="handroll">Hand Roll</option>
                        <option value="cafe">Café</option>
                        <option value="fuente">Fuente</option>
                    </select>
                </div>
                <div>
                    <label>Tipo</label>
                    <select id="hist-tipo" onchange="cargarHistorial()">
                        <option value="">Todos</option>
                        <option value="ingreso">Ingreso</option>
                        <option value="salida">Salida</option>
                        <option value="transferencia">Transferencia</option>
                        <option value="ajuste">Ajuste</option>
                    </select>
                </div>
            </div>
            <div id="tabla-historial"><p class="loading">Cargando...</p></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

    const email = document.getElementById('inp-email').value.trim();
    const pass  = document.getElementById('inp-pass').value;
    const err   = document.getElementById('login-err');
    err.style.display = 'none';
    try {
        const { error } = await SB.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        await mostrarDashboard();
    } catch (e) {
        err.style.display = 'block';
    }
}

async function doLogout() {
    await SB.auth.signOut();
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
}

async function mostrarDashboard() {
    const { data: { user } } = await SB.auth.getUser();
    if (!user) return;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display  = 'block';
    document.getElementById('hdr-usuario').textContent  = user.email;
    await cargarTodo();
    poblarProductos('rep-sitio', 'rep-prod');
    poblarProductos('mov-origen', 'mov-prod');
}

// ─── CARGA DE DATOS ────────────────────────────────────────────────────────
async function cargarTodo() {
    try {
        const { data, error } = await SB
            .from('stock_local')
            .select('producto_id, sitio, cantidad, alerta_min');
        if (error) throw error;
        stockMap.clear();
        (data || []).forEach(r => {
            stockMap.set(r.producto_id + '|' + r.sitio, {
                cantidad:  r.cantidad  ?? 0,
                alerta_min: r.alerta_min ?? MIN_DEFAULT
            });
        });
        renderGeneral();
        renderIndividual();
        renderAlertas();
        renderMinimos();
    } catch (e) {
        console.error('cargarTodo:', e);
        toast('Error cargando stock', 'err');
    }
}

function getStock(productoId, sitio) {
    return stockMap.get(productoId + '|' + sitio) || null;
}

function getCantidad(productoId, sitio) {
    return getStock(productoId, sitio)?.cantidad ?? null;
}

// ─── VISTA GENERAL ─────────────────────────────────────────────────────────
function renderGeneral() {
    // Unir todos los productos de los 3 catálogos sin repetir
    const todos = [];
    const vistos = new Set();
    ['cafe','fuente','handroll'].forEach(sitio => {
        CATALOGO[sitio].forEach(p => {
            const key = p.cat + '|' + p.id;
            if (!vistos.has(key)) { vistos.add(key); todos.push({ ...p, sitios: [] }); }
        });
    });

    // Agrupar por categoría
    const porCat = {};
    todos.forEach(p => {
        if (!porCat[p.cat]) porCat[p.cat] = [];
        porCat[p.cat].push(p);
    });

    let html = `<table class="stock-table">
        <thead><tr>
            <th>Producto</th>
            <th class="c-hand">🍣 Hand Roll</th>
            <th class="c-cafe">☕ Café</th>
            <th class="c-fuente">🌭 Fuente</th>
        </tr></thead><tbody>`;

    Object.entries(porCat).forEach(([cat, prods]) => {
        html += `<tr class="cat-header"><td colspan="4">${cat}</td></tr>`;
        prods.forEach(p => {
            html += `<tr><td>${p.nombre}</td>`;
            ['handroll','cafe','fuente'].forEach(sitio => {
                const enCatalogo = CATALOGO[sitio].some(x => x.id === p.id);
                if (!enCatalogo) { html += `<td class="qty none">—</td>`; return; }
                const qty = getCantidad(p.id, sitio);
                if (qty === null) { html += `<td class="qty none">-</td>`; return; }
                const min = getStock(p.id, sitio)?.alerta_min ?? MIN_DEFAULT;
                const cls = qty === 0 ? 'empty' : qty <= min ? 'low' : 'ok';
                html += `<td class="qty ${cls}">${qty}</td>`;
            });
            html += `</tr>`;
        });
    });

    html += '</tbody></table>';
    document.getElementById('tabla-general').innerHTML = html;
}

// ─── VISTA INDIVIDUAL ──────────────────────────────────────────────────────
function renderIndividual() {
    const sitio = document.getElementById('ind-sitio').value;
    const prods = CATALOGO[sitio];
    const porCat = {};
    prods.forEach(p => {
        if (!porCat[p.cat]) porCat[p.cat] = [];
        porCat[p.cat].push(p);
    });

    let html = `<table class="stock-table">
        <thead><tr>
            <th>Producto</th>
            <th>Stock</th>
            <th>Mínimo</th>
            <th>Estado</th>
        </tr></thead><tbody>`;

    Object.entries(porCat).forEach(([cat, prods]) => {
        html += `<tr class="cat-header"><td colspan="4">${cat}</td></tr>`;
        prods.forEach(p => {
            const s   = getStock(p.id, sitio);
            const qty = s?.cantidad ?? null;
            const min = s?.alerta_min ?? MIN_DEFAULT;
            let estado = '—', cls = 'none';
            if (qty !== null) {
                if (qty === 0)    { estado = '🔴 Agotado'; cls = 'empty'; }
                else if (qty <= min) { estado = '🟡 Bajo';    cls = 'low';   }
                else               { estado = '🟢 OK';       cls = 'ok';    }
            }
            html += `<tr>
                <td>${p.nombre}</td>
                <td class="qty ${cls}">${qty ?? '-'}</td>
                <td style="text-align:center;color:var(--muted)">${min}</td>
                <td style="font-size:0.82rem">${estado}</td>
            </tr>`;
        });
    });

    html += '</tbody></table>';
    document.getElementById('tabla-individual').innerHTML = html;
}

// ─── POBLAR SELECTS ─────────────────────────────────────────────────────────
function poblarProductos(selectSitioId, selectProdId) {
    const sitio = document.getElementById(selectSitioId).value;
    const sel   = document.getElementById(selectProdId);
    const prods = CATALOGO[sitio];
    let html = '';
    let lastCat = '';
    prods.forEach(p => {
        if (p.cat !== lastCat) {
            if (lastCat) html += '</optgroup>';
            html += `<optgroup label="${p.cat}">`;
            lastCat = p.cat;
        }
        const qty = getCantidad(p.id, sitio);
        const label = qty !== null ? `${p.nombre} (stock: ${qty})` : p.nombre;
        html += `<option value="${p.id}">${label}</option>`;
    });
    if (lastCat) html += '</optgroup>';
    sel.innerHTML = html;
}

// ─── REPONER ────────────────────────────────────────────────────────────────
async function reponerStock() {
    const sitio    = document.getElementById('rep-sitio').value;
    const prodId   = document.getElementById('rep-prod').value;
    const cant     = parseInt(document.getElementById('rep-cant').value);
    const nota     = document.getElementById('rep-nota').value.trim();
    const prodNombre = CATALOGO[sitio].find(p => p.id === prodId)?.nombre || prodId;

    if (!cant || cant < 1) { toast('Ingresa una cantidad válida', 'err'); return; }

    const actual = getCantidad(prodId, sitio) ?? 0;
    const nueva  = actual + cant;
    const min    = getStock(prodId, sitio)?.alerta_min ?? MIN_DEFAULT;

    try {
        // Upsert stock_local
        const { error: e1 } = await SB.from('stock_local').upsert(
            { producto_id: prodId, sitio, cantidad: nueva, alerta_min: min, updated_at: new Date().toISOString() },
            { onConflict: 'producto_id,sitio' }
        );
        if (e1) throw e1;

        // Registrar movimiento
        await SB.from('stock_movimientos').insert({
            producto_id: prodId, producto_nombre: prodNombre,
            sitio, tipo: 'ingreso',
            cantidad: cant, cantidad_anterior: actual,
            nota: nota || 'Reposición manual',
            creado_at: new Date().toISOString()
        });

        stockMap.set(prodId + '|' + sitio, { cantidad: nueva, alerta_min: min });
        await cargarTodo();
        poblarProductos('rep-sitio', 'rep-prod');
        document.getElementById('rep-cant').value = 1;
        document.getElementById('rep-nota').value = '';
        toast(`✅ ${prodNombre}: +${cant} en ${SITIO_LABEL[sitio]}`, 'ok');
    } catch (e) {
        console.error(e);
        toast('Error al reponer: ' + (e.message || e), 'err');
    }
}

// ─── MOVER ──────────────────────────────────────────────────────────────────
async function moverStock() {
    const origen  = document.getElementById('mov-origen').value;
    const destino = document.getElementById('mov-destino').value;
    const prodId  = document.getElementById('mov-prod').value;
    const cant    = parseInt(document.getElementById('mov-cant').value);
    const prodNombre = CATALOGO[origen].find(p => p.id === prodId)?.nombre || prodId;

    if (origen === destino) { toast('Origen y destino no pueden ser el mismo', 'err'); return; }
    if (!cant || cant < 1)  { toast('Ingresa una cantidad válida', 'err'); return; }

    const cantO = getCantidad(prodId, origen) ?? 0;
    if (cantO < cant) { toast(`Stock insuficiente en ${SITIO_LABEL[origen]} (hay ${cantO})`, 'err'); return; }

    const cantD   = getCantidad(prodId, destino) ?? 0;
    const nuevaO  = cantO - cant;
    const nuevaD  = cantD + cant;
    const minO    = getStock(prodId, origen)?.alerta_min  ?? MIN_DEFAULT;
    const minD    = getStock(prodId, destino)?.alerta_min ?? MIN_DEFAULT;

    try {
        const { error: e1 } = await SB.from('stock_local').upsert(
            { producto_id: prodId, sitio: origen,  cantidad: nuevaO, alerta_min: minO, updated_at: new Date().toISOString() },
            { onConflict: 'producto_id,sitio' }
        );
        if (e1) throw e1;

        const { error: e2 } = await SB.from('stock_local').upsert(
            { producto_id: prodId, sitio: destino, cantidad: nuevaD, alerta_min: minD, updated_at: new Date().toISOString() },
            { onConflict: 'producto_id,sitio' }
        );
        if (e2) throw e2;

        await SB.from('stock_movimientos').insert({
            producto_id: prodId, producto_nombre: prodNombre,
            sitio: origen, sitio_destino: destino, tipo: 'transferencia',
            cantidad: cant, cantidad_anterior: cantO,
            nota: `${SITIO_LABEL[origen]} → ${SITIO_LABEL[destino]}`,
            creado_at: new Date().toISOString()
        });

        stockMap.set(prodId + '|' + origen,  { cantidad: nuevaO, alerta_min: minO });
        stockMap.set(prodId + '|' + destino, { cantidad: nuevaD, alerta_min: minD });
        await cargarTodo();
        toast(`✅ ${prodNombre}: ${cant} movidos a ${SITIO_LABEL[destino]}`, 'ok');
    } catch (e) {
        console.error(e);
        toast('Error al mover: ' + (e.message || e), 'err');
    }
}

// ─── ALERTAS ────────────────────────────────────────────────────────────────
function renderAlertas() {
    const agotados = [];
    const bajos    = [];

    ['cafe','fuente','handroll'].forEach(sitio => {
        CATALOGO[sitio].forEach(p => {
            const s = getStock(p.id, sitio);
            if (!s) return;
            if (s.cantidad === 0) agotados.push({ ...p, sitio, cantidad: 0, min: s.alerta_min });
            else if (s.cantidad <= s.alerta_min) bajos.push({ ...p, sitio, cantidad: s.cantidad, min: s.alerta_min });
        });
    });

    // Badge en tab
    const total = agotados.length + bajos.length;
    const btn   = document.getElementById('btn-tab-alertas');
    btn.innerHTML = `⚠️ Alertas${total > 0 ? ` <span class="badge">${total}</span>` : ''}`;

    const renderLista = (items, contenedor, cls) => {
        if (!items.length) {
            document.getElementById(contenedor).innerHTML = `<p class="empty-msg">✅ Ninguno</p>`;
            return;
        }
        document.getElementById(contenedor).innerHTML = items.map(p => `
            <div class="alerta-item ${cls}">
                <div>
                    <span class="alerta-sitio ${SITIO_CLASS[p.sitio]}">${SITIO_LABEL[p.sitio]}</span>
                    <div style="font-weight:600;margin-top:2px">${p.nombre}</div>
                </div>
                <div style="text-align:right;font-size:0.82rem">
                    <div style="font-weight:700">${p.cantidad} uds</div>
                    <div style="color:var(--muted)">mín ${p.min}</div>
                </div>
            </div>`).join('');
    };

    renderLista(agotados, 'alertas-agotados', 'red');
    renderLista(bajos,    'alertas-bajos',    'yellow');
}

// ─── MÍNIMOS ────────────────────────────────────────────────────────────────
function renderMinimos() {
    const sitio = document.getElementById('min-sitio').value;
    const prods = CATALOGO[sitio];
    document.getElementById('tabla-minimos').innerHTML = prods.map(p => {
        const min = getStock(p.id, sitio)?.alerta_min ?? MIN_DEFAULT;
        return `<div class="min-row">
            <span style="font-size:0.88rem">${p.nombre}</span>
            <div style="display:flex;gap:8px;align-items:center">
                <input type="number" id="min-${p.id}" value="${min}" min="0" style="width:72px">
                <button class="btn-save-min" onclick="guardarMinimo('${p.id}','${sitio}')">Guardar</button>
            </div>
        </div>`;
    }).join('');
}

async function guardarMinimo(prodId, sitio) {
    const min = parseInt(document.getElementById('min-' + prodId).value);
    if (isNaN(min) || min < 0) { toast('Valor inválido', 'err'); return; }
    const cant = getCantidad(prodId, sitio) ?? 0;
    try {
        const { error } = await SB.from('stock_local').upsert(
            { producto_id: prodId, sitio, cantidad: cant, alerta_min: min, updated_at: new Date().toISOString() },
            { onConflict: 'producto_id,sitio' }
        );
        if (error) throw error;
        const s = stockMap.get(prodId + '|' + sitio) || { cantidad: cant };
        s.alerta_min = min;
        stockMap.set(prodId + '|' + sitio, s);
        renderAlertas();
        toast('Mínimo guardado', 'ok');
    } catch (e) {
        toast('Error: ' + (e.message || e), 'err');
    }
}

// ─── HISTORIAL ──────────────────────────────────────────────────────────────
async function cargarHistorial() {
    document.getElementById('tabla-historial').innerHTML = '<p class="loading">Cargando...</p>';
    const sitio = document.getElementById('hist-sitio').value;
    const tipo  = document.getElementById('hist-tipo').value;
    try {
        let q = SB.from('stock_movimientos')
            .select('producto_nombre, sitio, sitio_destino, tipo, cantidad, cantidad_anterior, nota, creado_at')
            .order('creado_at', { ascending: false })
            .limit(60);
        if (sitio) q = q.eq('sitio', sitio);
        if (tipo)  q = q.eq('tipo', tipo);
        const { data, error } = await q;
        if (error) throw error;
        if (!data?.length) {
            document.getElementById('tabla-historial').innerHTML = '<p class="empty-msg">Sin movimientos</p>';
            return;
        }
        document.getElementById('tabla-historial').innerHTML = data.map(r => {
            const fecha = new Date(r.creado_at).toLocaleString('es-CL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            const destino = r.sitio_destino ? ` → ${SITIO_LABEL[r.sitio_destino] || r.sitio_destino}` : '';
            return `<div class="hist-row">
                <span class="hist-tipo ${r.tipo}">${r.tipo}</span>
                <div style="flex:1">
                    <div style="font-weight:600;font-size:0.87rem">${r.producto_nombre || '—'}</div>
                    <div style="color:var(--muted);font-size:0.78rem">${SITIO_LABEL[r.sitio] || r.sitio}${destino} · ${r.nota || ''}</div>
                </div>
                <div style="text-align:right;white-space:nowrap">
                    <div style="font-weight:700">${r.cantidad > 0 ? '+' : ''}${r.cantidad}</div>
                    <div style="color:var(--muted);font-size:0.75rem">${fecha}</div>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        document.getElementById('tabla-historial').innerHTML = '<p class="empty-msg">Error al cargar historial</p>';
    }
}

// ─── UI ─────────────────────────────────────────────────────────────────────
function showTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
    if (id === 'historial') cargarHistorial();
    if (id === 'individual') renderIndividual();
    if (id === 'minimos')   renderMinimos();
}

let _toastTimer;
function toast(msg, tipo) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast show ' + (tipo || 'ok');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async function init() {
    const { data: { session } } = await SB.auth.getSession();
    if (session) {
        await mostrarDashboard();
    }
    document.getElementById('inp-pass').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
})();
</script>
